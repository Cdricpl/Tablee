<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1c2a1d" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Tablée — ce qu'on cuisine, ce qu'on partage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="masthead">
    <div class="masthead-top">
      <span id="issueNo">N° 001</span>
      <span class="dot">·</span>
      <span id="issueDay">DIMANCHE</span>
    </div>
    <p class="tagline"><em>ce qu'on cuisine, ce qu'on partage</em></p>
    <h1 class="logo">Tab<em>lée</em></h1>
    <div class="est"><span class="rule"></span><em>est. 2026</em><span class="rule"></span></div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab" data-view="library" role="tab" aria-selected="true">Recettes</button>
    <button class="tab" data-view="week" role="tab">Semaine</button>
    <button class="tab" data-view="shopping" role="tab">Courses</button>
  </nav>

  <main id="app"></main>

  <div id="modal" class="modal" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
